<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Videograf Nunta</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
text-align:center;
}

header{
padding:60px 20px;
}

h1{
font-size:48px;
margin-bottom:10px;
}

p{
color:#aaa;
}

.videos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:30px;
padding:40px;
}

iframe{
width:100%;
aspect-ratio:16/9;
border:none;
border-radius:12px;
}

footer{
padding:40px;
color:#777;
}
</style>
</head>

<body>

<header>
<h1>Wedding Films</h1>
<p>Filme de nuntă cinematice</p>
</header>

<section class="videos">

<iframe src="https://www.youtube.com/embed/VIDEO1" allowfullscreen></iframe>

<iframe src="https://www.youtube.com/embed/VIDEO2" allowfullscreen></iframe>

<iframe src="https://www.youtube.com/embed/VIDEO3" allowfullscreen></iframe>

</section>

<footer>
© 2026 Videograf Nunta
</footer>

</body>
</html>
