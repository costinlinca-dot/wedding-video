<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Videograf Nuntă Premium</title>
<meta name="description" content="Filme de nuntă cinematice, minimal și elegant. Videograf profesional București.">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;color:#111;background:#fff;line-height:1.5;}
a{text-decoration:none;color:inherit;}
button{cursor:pointer;transition:0.3s;}

/* HERO */
.hero{position:relative;height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;background:#111;}
.hero video{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;opacity:0.35;z-index:-1;}
.hero .content{color:#fff;z-index:2;max-width:800px;}
.hero h1{font-size:4rem;font-weight:700;margin-bottom:1rem;}
.hero p{font-size:1.5rem;margin-bottom:2rem;color:#ddd;}
.hero button{padding:16px 32px;font-size:1rem;background:#ff3366;color:white;border:none;border-radius:8px;letter-spacing:0.5px;}

/* PORTOFOLIU */
.portfolio{padding:80px 20px;max-width:1200px;margin:0 auto;}
.portfolio h2{text-align:center;font-size:3rem;font-weight:700;margin-bottom:50px;color:#111;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:30px;}
.grid-item{position:relative;overflow:hidden;border-radius:16px;box-shadow:0 15px 30px rgba(0,0,0,0.1);transition:transform 0.3s;}
.grid-item iframe{width:100%;aspect-ratio:16/9;transition:transform 0.3s;}
.grid-item:hover iframe{transform:scale(1.05);}
.grid-item .title{position:absolute;bottom:0;left:0;width:100%;background:rgba(0,0,0,0.5);padding:12px;font-weight:600;text-align:center;color:white;backdrop-filter:blur(5px);}

/* CONTACT */
.contact{padding:80px 20px;text-align:center;background:#f7f7f7;}
.contact h2{font-size:2.5rem;margin-bottom:20px;color:#111;}
.contact p{margin-bottom:20px;color:#555;}
.contact button{padding:14px 28px;margin:5px;font-size:1rem;border:none;border-radius:8px;background:#ff3366;color:white;transition:0.3s;}
.contact button:hover{opacity:0.85;}

/* FOOTER */
footer{padding:40px;text-align:center;color:#888;font-size:0.9rem;background:#111;color:white;}

/* Responsive */
@media (max-width:768px){.hero h1{font-size:2.5rem;}.hero p{font-size:1.1rem;}}
</style>
</head>
<body>

<!-- HERO VIDEO FULLSCREEN -->
<section class="hero">
<video autoplay muted loop playsinline>
<source src="https://www.w3schools.com/howto/rain.mp4" type="video/mp4">
</video>
<div class="content">
<h1>Wedding Films Premium</h1>
<p>Filme de nuntă minimal, elegant și cinematice, pentru ziua ta specială</p>
<button onclick="document.getElementById('portfolio').scrollIntoView({behavior:'smooth'})">Vezi Portofoliu</button>
</div>
</section>

<!-- PORTOFOLIU -->
<section class="portfolio" id="portfolio">
<h2>Portofoliu</h2>
<div class="grid">
<div class="grid-item">
<iframe src="https://www.youtube.com/embed/VIDEO1" allowfullscreen></iframe>
<div class="title">Ana & Mihai</div>
</div>
<div class="grid-item">
<iframe src="https://www.youtube.com/embed/VIDEO2" allowfullscreen></iframe>
<div class="title">Elena & Robert</div>
</div>
<div class="grid-item">
<iframe src="https://www.youtube.com/embed/VIDEO3" allowfullscreen></iframe>
<div class="title">Bianca & Alex</div>
</div>
</div>
</section>

<!-- CONTACT -->
<section class="contact">
<h2>Contact</h2>
<p>Dacă îți place stilul meu, contactează-mă:</p>
<button onclick="window.location.href='mailto:youremail@example.com'">Trimite mesaj</button>
<button onclick="window.location.href='https://wa.me/1234567890'">WhatsApp</button>
<button onclick="window.open('https://instagram.com/username','_blank')">Instagram</button>
</section>

<!-- FOOTER -->
<footer>
© 2026 Videograf Nuntă. Toate drepturile rezervate.
</footer>

</body>
</html>
