<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Videograf Nunta Cinematic</title>
<meta name="description" content="Filme de nuntă cinematice - Wedding films pentru ziua ta specială. Videograf profesional București.">
<style>
/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Arial',sans-serif;background:#0f0f0f;color:white;}
a{text-decoration:none;color:inherit;}
button{cursor:pointer;}

/* HERO */
.hero{position:relative;height:100vh;width:100vw;overflow:hidden;}
.hero video{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:-1;}
.hero .overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);}
.hero .content{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
.hero h1{font-size:4rem;margin-bottom:1rem;}
.hero p{font-size:1.5rem;margin-bottom:2rem;}
.hero button{padding:16px 32px;background:#ff3366;border:none;border-radius:8px;font-size:1rem;color:white;}

/* PORTOFOLIU */
.portfolio{padding:60px 20px;}
.portfolio h2{text-align:center;font-size:3rem;margin-bottom:40px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;}
.grid-item{position:relative;overflow:hidden;border-radius:12px;cursor:pointer;}
.grid-item iframe{width:100%;aspect-ratio:16/9;transition:transform 0.3s ease;}
.grid-item:hover iframe{transform:scale(1.05);}
.grid-item .title{position:absolute;bottom:0;left:0;width:100%;background:rgba(0,0,0,0.6);padding:10px;font-weight:bold;text-align:center;}

/* CONTACT */
.contact{padding:60px 20px;text-align:center;}
.contact h2{font-size:2.5rem;margin-bottom:20px;}
.contact p{margin-bottom:20px;color:#ccc;}
.contact button{padding:12px 28px;background:#ff3366;border:none;border-radius:8px;color:white;font-size:1rem;margin:5px;}

/* FOOTER */
footer{padding:40px;text-align:center;color:#777;font-size:0.9rem;}
</style>
</head>
<body>

<!-- HERO VIDEO FULLSCREEN -->
<section class="hero">
<video autoplay muted loop>
<source src="https://www.w3schools.com/howto/rain.mp4" type="video/mp4">
</video>
<div class="overlay"></div>
<div class="content">
<h1>Wedding Films</h1>
<p>Filme de nuntă cinematice și emoționante</p>
<button onclick="document.getElementById('portfolio').scrollIntoView({behavior:'smooth'})">Vezi Portofoliu</button>
</div>
</section>

<!-- PORTOFOLIU -->
<section class="portfolio" id="portfolio">
<h2>Portofoliu</h2>
<div class="grid">
<div class="grid-item">
<iframe src="https://www.youtube.com/embed/VIDEO1" allowfullscreen></iframe>
<div class="title">Ana & Mihai</div>
</div>
<div class="grid-item">
<iframe src="https://www.youtube.com/embed/VIDEO2" allowfullscreen></iframe>
<div class="title">Elena & Robert</div>
</div>
<div class="grid-item">
<iframe src="https://www.youtube.com/embed/VIDEO3" allowfullscreen></iframe>
<div class="title">Bianca & Alex</div>
</div>
</div>
</section>

<!-- CONTACT -->
<section class="contact">
<h2>Contact</h2>
<p>Dacă îți place stilul meu, contactează-mă:</p>
<button onclick="window.location.href='mailto:youremail@example.com'">Trimite mesaj</button>
<button onclick="window.location.href='https://wa.me/1234567890'">WhatsApp</button>
<button onclick="window.open('https://instagram.com/username','_blank')">Instagram</button>
</section>

<!-- FOOTER -->
<footer>
© 2026 Videograf Nunta. Toate drepturile rezervate.
</footer>

</body>
</html>
